<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detection System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 40px 20px; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        textarea { width: 100%; height: 180px; margin-top: 10px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .file-upload-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        button { background-color: #007bff; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #result-box { margin-top: 25px; padding: 20px; border-radius: 8px; font-size: 18px; text-align: center; display: none; }
        .loading { text-align: center; margin-top: 20px; font-style: italic; color: #666; display: none; }
        .viz-container { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .viz-card { flex: 1; min-width: 250px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .viz-card img { width: 100%; height: auto; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Fake News Detection System</h2>
    
    <label for="newsText"><strong>Paste news article text below:</strong></label>
    <textarea id="newsText" placeholder="Paste the content of the news article you want to verify here..."></textarea>
    
    <div class="file-upload-section">
        <label for="fileInput"><strong>Or upload a text file (.txt):</strong></label><br><br>
        <input type="file" id="fileInput" accept=".txt">
    </div>
    
    <button onclick="analyzeNews()" id="analyzeBtn">Analyze News</button>

    <div id="loading" class="loading">Analyzing text... Please wait.</div>
    <div id="result-box"></div>

    <div id="visualizations" style="display: none; margin-top: 30px; text-align: center; border-top: 2px solid #eee; padding-top: 20px;">
        <h3>AI Model Performance Metrics</h3>
        <p style="color: #666; font-size: 14px;">These charts show the overall accuracy of the AI model based on the training dataset.</p>
        
        <div class="viz-container">
            <div class="viz-card">
                <img id="barChart" src="" alt="Model Accuracy Bar Chart">
            </div>
            <div class="viz-card">
                <img id="confMatrix" src="" alt="Confusion Matrix">
            </div>
        </div>
    </div>
</div>

<script>
    // Handle File Upload
    document.getElementById('fileInput').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) { document.getElementById('newsText').value = e.target.result; };
            reader.readAsText(file);
        }
    });

    // Send to API
    async function analyzeNews() {
        const text = document.getElementById('newsText').value;
        const resultBox = document.getElementById('result-box');
        const loading = document.getElementById('loading');
        const btn = document.getElementById('analyzeBtn');
        const visualizations = document.getElementById('visualizations');

        if (!text.trim()) { alert("Please enter text or upload a file!"); return; }

        resultBox.style.display = "none";
        visualizations.style.display = "none";
        loading.style.display = "block";
        btn.disabled = true;

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();
            
            loading.style.display = "none";
            btn.disabled = false;

            // Show Result
            resultBox.style.display = "block";
            if (data.result === "Real News") {
                resultBox.style.backgroundColor = "#d4edda";
                resultBox.style.color = "#155724";
                resultBox.style.border = "1px solid #c3e6cb";
            } else {
                resultBox.style.backgroundColor = "#f8d7da";
                resultBox.style.color = "#721c24";
                resultBox.style.border = "1px solid #f5c6cb";
            }
            resultBox.innerHTML = `<strong>Prediction:</strong> ${data.result} <br><br> <strong>Confidence Score:</strong> ${data.confidence}%`;

            // Load and Show Images (adding a timestamp so the browser doesn't cache old images)
            const timestamp = new Date().getTime();
            document.getElementById('barChart').src = `/static/bar_chart.png?t=${timestamp}`;
            document.getElementById('confMatrix').src = `/static/confusion_matrix.png?t=${timestamp}`;
            visualizations.style.display = "block";

        } catch (error) {
            loading.style.display = "none";
            btn.disabled = false;
            alert("Error connecting to server. Is uvicorn running?");
            console.error(error);
        }
    }
</script>

</body>
</html>
